<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Edit Produk | LIL TEES Admin</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/admin.css">

    <link
        rel="stylesheet"
        href="../css/products-edit.css">

</head>

<body>

<div class="admin-layout">

    <!-- ==========================
         SIDEBAR
    =========================== -->

    <aside class="sidebar" id="sidebar">

        <div class="sidebar-top">
    
            <div class="logo">

    
                <img
                    src="../images/logofooter.png"
                    alt="Logo">
    
                <div class="logo-text">
    
                    <h2>LIL TEES</h2>
    
                    <span>Admin Panel</span>
    
                </div>
    
            </div>
    
            <nav>
    
                <a href="dashboard.html">
    
                    <span class="icon">🏠</span>
    
                    <span class="text">Dashboard</span>
    
                </a>
    
                <a href="products.html">
    
                    <span class="icon">📦</span>
    
                    <span class="text">Products</span>
    
                </a>
    
                <a href="stock.html">
    
                    <span class="icon">📊</span>
    
                    <span class="text">Stock</span>
    
                </a>
    
                <a href="history.html">
    
                    <span class="icon">🕘</span>
    
                    <span class="text">History</span>
    
                </a>
    
            </nav>
    
        </div>
    
        <button
            class="logout-btn"
            class="logout-btn" id="logoutBtn">
    
            <span class="icon">🚪</span>
    
            <span class="text">
    
                Logout
    
            </span>
    
        </button>
    
    </aside>

    <!-- ==========================
         CONTENT
    =========================== -->

    <main class="content">

        <div class="page-header">

            <div>

                <h1>Edit Produk</h1>

                <p>

                    Perbarui informasi produk.

                </p>

            </div>

            <a
                href="products.html"
                class="primary-btn">

                ← Kembali

            </a>

        </div>

        <div class="form-card">

            <form id="productForm">
                
                <div class="form-grid">

                    <!-- Nama Produk -->

                    <div class="form-group full">

                        <label>Nama Produk</label>

                        <input
                            type="text"
                            id="name"
                            placeholder="Masukkan nama produk"
                            required>

                    </div>

                    <!-- Harga -->

                    <div class="form-group">

                        <label>Harga</label>

                        <input
                            type="number"
                            id="price"
                            placeholder="Contoh : 99000"
                            required>

                    </div>

                    <!-- Stock -->

                    <div class="form-group">

                        <label>Stock</label>

                        <input
                            type="number"
                            id="stock"
                            placeholder="Jumlah stock"
                            required>

                    </div>

                    <!-- Status -->

                    <div class="form-group full">

                        <label>Status</label>

                        <select id="status">

                            <option value="true">

                                Active

                            </option>

                            <option value="false">

                                Non Active

                            </option>

                        </select>

                    </div>

                    <!-- Deskripsi -->

                    <div class="form-group full">

                        <label>Deskripsi</label>

                        <textarea
                            id="description"
                            rows="5"
                            placeholder="Deskripsi produk..."></textarea>

                    </div>

                </div>

                <!-- ==========================
                     PREVIEW IMAGE
                =========================== -->

                <div class="preview-grid">

                    <!-- Front Image -->

                    <div class="form-group">

                        <label>Front Image</label>

                        <div class="image-preview">

                            <img
                                id="frontPreview"
                                alt="Front Image"
                                style="display:none;">

                        </div>

                        <input
                            type="file"
                            id="frontImage"
                            accept="image/*">

                    </div>

                    <!-- Back Image -->

                    <div class="form-group">

                        <label>Back Image</label>

                        <div class="image-preview">

                            <img
                                id="backPreview"
                                alt="Back Image"
                                style="display:none;">

                        </div>

                        <input
                            type="file"
                            id="backImage"
                            accept="image/*">

                    </div>

                </div>

                <!-- ==========================
                     PRODUCT INFO
                =========================== -->

                <div class="info-card">

                    <div>

                        <span>Dibuat</span>

                        <strong id="createdAt">

                            -

                        </strong>

                    </div>

                    <div>

                        <span>ID Produk</span>

                        <strong id="productId">

                            -

                        </strong>

                    </div>

                </div>

                <!-- ==========================
                     BUTTON
                =========================== -->

                <button
                    type="submit"
                    class="save-btn">

                    Update Produk

                </button>

            </form>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/guard.js"></script>

<script src="../js/products-edit.js"></script>

<script src="../js/admin.js"></script>

</body>

</html>
