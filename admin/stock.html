<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Stock | LIL TEES Admin</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/admin.css">

    <link
        rel="stylesheet"
        href="../css/stock.css">

</head>

<body>

<div class="admin-layout">

    <!-- ==========================
         SIDEBAR
    =========================== -->

    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="logo">

                <img
                    src="../images/logofooter.png"
                    alt="Logo">

                <div>

                    <h2>LIL TEES</h2>

                    <span>Admin Panel</span>

                </div>

            </div>

            <nav>

                <a href="dashboard.html">

                    Dashboard

                </a>

                <a href="products.html">

                    Products

                </a>

                <a
                    href="stock.html"
                    class="active">

                    Stock

                </a>

                <a href="history.html">

                    History

                </a>

            </nav>

        </div>

        <button id="logoutBtn">

            Logout

        </button>

    </aside>

    <!-- ==========================
         CONTENT
    =========================== -->

    <main class="content">

        <div class="page-header">

            <div>

                <h1>Stock</h1>

                <p>

                    Kelola stok produk secara cepat.

                </p>

            </div>

        </div>

        <!-- ==========================
             SEARCH
        =========================== -->

        <div class="search-box">

            <input
                type="text"
                id="searchProduct"
                placeholder="Cari produk...">

        </div>

        <!-- ==========================
             STOCK LIST
        =========================== -->

        <div
            id="stockContainer"
            class="stock-list">

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/guard.js"></script>

<script src="../js/stock.js"></script>

</body>

</html>
