<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Products | LIL TEES Admin</title>

    <link rel="stylesheet"
          href="../css/admin.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="admin-layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="logo">

                <img src="../images/logofooter.png"
                     alt="Logo">

                <div>

                    <h2>LIL TEES</h2>

                    <span>Admin Panel</span>

                </div>

            </div>

            <nav>

                <a href="dashboard.html">

                    Dashboard

                </a>

                <a href="products.html"
                   class="active">

                    Products

                </a>

                <a href="stock.html">

                    Stock

                </a>

                <a href="history.html">

                    History

                </a>

            </nav>

        </div>

        <button id="logoutBtn">

            Logout

        </button>

    </aside>

    <!-- Content -->

    <main class="content">

        <div class="page-header">

            <div>

                <h1>Products</h1>

                <p>

                    Kelola semua produk Lil Tees.

                </p>

            </div>

            <button id="addProductBtn">

                + Tambah Produk

            </button>

        </div>

        <div id="productContainer"
             class="product-grid">
                     <!-- Product akan muncul di sini -->

        </div>

    </main>

</div>

<!-- =========================
     MODAL TAMBAH PRODUK
========================= -->

<div id="productModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Tambah Produk</h2>

            <button id="closeModal">

                ✕

            </button>

        </div>

        <form id="productForm">

            <div class="form-group">

                <label>Nama Produk</label>

                <input
                    type="text"
                    id="name"
                    required>

            </div>

            <div class="form-group">

                <label>Harga</label>

                <input
                    type="number"
                    id="price"
                    required>

            </div>

            <div class="form-group">

                <label>Stock</label>

                <input
                    type="number"
                    id="stock"
                    required>

            </div>

            <div class="form-group">

                <label>Deskripsi</label>

                <textarea
                    id="description"
                    rows="4"></textarea>

            </div>

            <div class="form-group">

                <div class="form-group">

                    <label>Front Image</label>
                
                    <div class="image-preview">
                
                        <img
                            id="frontPreview"
                            src="../images/no-image.png"
                            alt="Front">
                
                    </div>
                
                    <input
                        type="file"
                        id="frontImage"
                        accept="image/*">
                
                </div>
                
                <div class="form-group">
                
                    <label>Back Image</label>
                
                    <div class="image-preview">
                
                        <img
                            id="backPreview"
                            src="../images/no-image.png"
                            alt="Back">
                
                    </div>
                
                    <input
                        type="file"
                        id="backImage"
                        accept="image/*">
                
                </div>
                
                <div class="form-group">
                
                    <label>Size Chart</label>
                
                    <div class="image-preview">
                
                        <img
                            id="sizePreview"
                            src="../images/no-image.png"
                            alt="Size Chart">
                
                    </div>
                
                    <input
                        type="file"
                        id="sizeChart"
                        accept="image/*">
                
                </div>

            <div class="form-group">

                <label>Status</label>

                <select id="status">

                    <option value="true">

                        Active

                    </option>

                    <option value="false">

                        Non Active

                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="save-btn">

                Simpan Produk

            </button>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/guard.js"></script>

<script src="../js/products.js"></script>

</body>

</html>
